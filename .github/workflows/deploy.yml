name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - 'predictions/**'
      - 'scripts/build_site_data.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild data.json (if predictions changed)
        run: |
          if [ -f predictions/predictions_v1_locked.csv ]; then
            cd scripts
            # adjust paths for repo layout
            python -c "
import csv, json, os
rows = []
with open('../predictions/predictions_v1_locked.csv', encoding='utf-8-sig') as f:
    for r in csv.DictReader(f):
        rows.append({
            'id': int(r['id']),
            'd': r['division'],
            't': int(r['total']),
            's': [int(r['s1']), int(r['s2']), int(r['s3'])],
            'rk': int(r['rank']),
            'n': int(r['division_n']),
            'su': (r['summary'] or '').strip()[:300],
            'rt': (r['rationale'] or '').strip()[:120],
            'lk': int(r['likeCount']),
        })
rows.sort(key=lambda x: (x['d'], -x['t'], x['rk']))
tech = [r for r in rows if r['d']=='TECH']
local = [r for r in rows if r['d']=='LOCAL']
def stats(items):
    n=len(items)
    return {'n':n,'mean_total':round(sum(r['t'] for r in items)/n,2),
            'max_total':max(r['t'] for r in items),'min_total':min(r['t'] for r in items)}
with open('../predictions/predictions_v1_locked.meta.json', encoding='utf-8') as f:
    meta = json.load(f)
bundle = {
    'version':'v1',
    'locked_at': meta['locked_at'],
    'sha256': meta['sha256'],
    'deadline':'2026-05-15',
    'slots':{'TECH':4000,'LOCAL':1000},
    'stats':{'TECH':stats(tech),'LOCAL':stats(local)},
    'scenarios':[
        {'id':'opt','name':'낙관 (TECH 82% / LOCAL 94%)','tech_pr':0.82,'local_pr':0.94,'desc':'최종 ~6,000명 가정 (현재 추세)'},
        {'id':'mid','name':'중도 (TECH 50% / LOCAL 60%)','tech_pr':0.50,'local_pr':0.60,'desc':'최종 ~10,000명 가정'},
        {'id':'pes','name':'비관 (TECH 30% / LOCAL 40%)','tech_pr':0.30,'local_pr':0.40,'desc':'최종 ~16,000명 가정 (예비창업패키지 50:1 참고)'},
    ],
    'rows': rows,
}
with open('../site/data.json','w',encoding='utf-8') as f:
    json.dump(bundle, f, ensure_ascii=False, separators=(',', ':'))
print(f'data.json: {len(rows)} rows')
"
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=modoo-startup-predictor --branch=master --commit-dirty=true
