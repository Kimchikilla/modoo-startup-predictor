name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
    paths:
      - 'site/**'
      - 'predictions/**'
      - 'scripts/build_site_data.py'
      - 'scripts/ci_build_data.py'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild data.json from predictions
        run: python scripts/ci_build_data.py

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=modoo-startup-predictor --branch=master --commit-dirty=true
